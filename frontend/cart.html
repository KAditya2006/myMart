<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - myMart</title>
  <link rel="icon" type="image/png" href="/media/logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--bg-color); padding-top: 80px; }
    .cart-wrapper { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 360px; gap: 30px; }
    .cart-card, .summary-card { background: white; border-radius: var(--radius-xl); padding: 30px; border: 1px solid var(--border-light); }
    .cart-title { font-size: 22px; font-weight: 800; color: var(--secondary-color); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .cart-table { width: 100%; border-collapse: collapse; }
    .cart-table th { text-align: left; padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--text-muted); background: var(--bg-color); border-bottom: 1px solid var(--border-light); }
    .cart-table td { padding: 16px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
    .cart-table tr:last-child td { border-bottom: none; }
    .product-cell { display: flex; align-items: center; gap: 16px; }
    .product-cell img { width: 72px; height: 72px; object-fit: contain; border-radius: var(--radius-md); background: var(--bg-color); }
    .product-cell h4 { font-size: 15px; font-weight: 600; color: var(--secondary-color); }
    .product-cell p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .qty-control { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 32px; height: 32px; border: 1px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-color); cursor: pointer; font-size: 18px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: var(--secondary-color); color: white; }
    .qty-num { width: 40px; text-align: center; font-size: 15px; font-weight: 600; }
    .remove-btn { background: none; border: none; color: #ef4444; font-size: 20px; cursor: pointer; padding: 6px; border-radius: var(--radius-md); transition: var(--transition); }
    .remove-btn:hover { background: #fef2f2; }
    .item-price { font-size: 15px; font-weight: 700; color: var(--secondary-color); }

    /* Empty Cart */
    .empty-cart { text-align: center; padding: 60px 20px; }
    .empty-cart .icon { font-size: 72px; margin-bottom: 20px; opacity: 0.4; }
    .empty-cart h2 { font-size: 22px; color: var(--secondary-color); margin-bottom: 10px; }
    .empty-cart p { color: var(--text-muted); margin-bottom: 24px; }
    .empty-cart a { background: var(--primary-color); color: white; padding: 14px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; }

    /* Summary */
    .summary-title { font-size: 18px; font-weight: 700; color: var(--secondary-color); margin-bottom: 24px; }
    .total-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; color: var(--text-muted); }
    .total-row.grand { font-size: 17px; font-weight: 800; color: var(--secondary-color); border-top: 1px solid var(--border-light); padding-top: 14px; margin-top: 6px; }
    .promo-section { margin: 20px 0; }
    .promo-section label { font-size: 13px; font-weight: 600; color: var(--secondary-color); display: block; margin-bottom: 8px; }
    .promo-input-row { display: flex; gap: 10px; }
    .promo-input-row input { flex: 1; padding: 12px 14px; border: 1.5px solid var(--border-light); border-radius: var(--radius-md); font-size: 14px; outline: none; transition: var(--transition); }
    .promo-input-row input:focus { border-color: var(--primary-color); }
    .promo-input-row button { padding: 12px 16px; background: var(--secondary-color); color: white; border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; }
    .checkout-btn { width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: var(--radius-md); font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 20px; text-align: center; text-decoration: none; display: inline-block; }
    .checkout-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .continue-btn { display: block; text-align: center; margin-top: 14px; color: var(--text-muted); font-size: 14px; text-decoration: none; }
    .continue-btn:hover { color: var(--primary-color); }

    @media (max-width: 900px) { .cart-wrapper { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .cart-table thead { display: none; }
      .cart-table td { display: block; padding: 8px 16px; }
      .cart-table tr { display: block; border: 1px solid var(--border-light); border-radius: var(--radius-md); margin-bottom: 16px; padding: 8px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="/frontend/homePage.html"><img src="/media/logo.png" alt="myMart"></a></div>
    <ul class="nav-links">
      <li><a href="/frontend/homePage.html">Home</a></li>
      <li><a href="/frontend/shop.html">Shop</a></li>
      <li><a href="/frontend/deals.html">Deals</a></li>
    </ul>
    <div class="actions">
      <a href="/frontend/cart.html" class="cart-link active">🛒 Cart <span class="cart-count">0</span></a>
    </div>
  </nav>

  <div class="cart-wrapper" id="cartWrapper">
    <div class="cart-card" id="cartCard">
      <div class="cart-title">🛒 Your Shopping Cart</div>
      <div id="cartContent"></div>
    </div>

    <div class="summary-card" id="summaryCard">
      <div class="summary-title">Order Summary</div>
      <div id="summaryContent">
        <div class="total-row"><span>Subtotal</span><span id="subtotalVal">₹0</span></div>
        <div class="total-row"><span>Shipping</span><span id="shippingVal">₹0</span></div>
        <div class="total-row"><span>Tax (5%)</span><span id="taxVal">₹0</span></div>
        <div class="total-row grand"><span>Total</span><span id="totalVal">₹0</span></div>
        <div class="promo-section">
          <label>Promo Code</label>
          <div class="promo-input-row">
            <input type="text" id="promoInput" placeholder="Enter code">
            <button onclick="applyPromo()">Apply</button>
          </div>
        </div>
        <a href="/frontend/checkout.html" class="checkout-btn">Proceed to Checkout →</a>
        <a href="/frontend/shop.html" class="continue-btn">← Continue Shopping</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    let cart = [];

    document.addEventListener('DOMContentLoaded', () => {
      cart = cartManager.getCart();
      renderCart();
    });

    function renderCart() {
      const content = document.getElementById('cartContent');
      cart = cartManager.getCart();

      if (!cart.length) {
        content.innerHTML = `
          <div class="empty-cart">
            <div class="icon">🛒</div>
            <h2>Cart is Empty</h2>
            <p>Looks like you haven't added anything yet.</p>
            <a href="/frontend/shop.html">Start Shopping</a>
          </div>`;
        document.getElementById('summaryCard').style.display = 'none';
        return;
      }

      document.getElementById('summaryCard').style.display = 'block';
      content.innerHTML = `
        <table class="cart-table">
          <thead><tr>
            <th>Product</th><th>Price</th><th>Quantity</th><th>Total</th><th></th>
          </tr></thead>
          <tbody>
            ${cart.map((item, i) => `
              <tr>
                <td>
                  <div class="product-cell">
                    <img src="${item.image}" alt="${item.name}" onerror="this.src='/media/logo.png'">
                    <div>
                      <h4>${item.name}</h4>
                      <p>Unit: ₹${item.price.toLocaleString()}</p>
                    </div>
                  </div>
                </td>
                <td class="item-price">₹${item.price.toLocaleString()}</td>
                <td>
                  <div class="qty-control">
                    <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
                    <span class="qty-num">${item.quantity}</span>
                    <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                  </div>
                </td>
                <td class="item-price">₹${(item.price * item.quantity).toLocaleString()}</td>
                <td><button class="remove-btn" onclick="removeItem(${i})" title="Remove">🗑️</button></td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      updateTotals();
    }

    function changeQty(index, delta) {
      cart[index].quantity = Math.max(1, cart[index].quantity + delta);
      cartManager.saveCart(cart);
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      cartManager.saveCart(cart);
      renderCart();
    }

    function updateTotals() {
      const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      const shipping = subtotal > 999 ? 0 : 49;
      const tax = Math.round(subtotal * 0.05);
      const total = subtotal + shipping + tax;
      document.getElementById('subtotalVal').textContent = `₹${subtotal.toLocaleString()}`;
      document.getElementById('shippingVal').textContent = shipping === 0 ? 'FREE' : `₹${shipping}`;
      document.getElementById('taxVal').textContent = `₹${tax.toLocaleString()}`;
      document.getElementById('totalVal').textContent = `₹${total.toLocaleString()}`;
    }

    function applyPromo() {
      const code = document.getElementById('promoInput').value.trim().toUpperCase();
      if (code === 'MYMART10') cartManager.showToast('Promo MYMART10 applied — 10% off! 🎉');
      else if (code === 'SAVE50') cartManager.showToast('Promo SAVE50 applied — ₹50 off! 🎉');
      else cartManager.showToast('Invalid promo code.');
    }
  </script>
</body>
</html>
