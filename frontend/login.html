<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - myMart</title>
  <link rel="icon" type="image/png" href="/media/logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f3f4f6; padding: 20px; }
    .auth-card { background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); width: 100%; max-width: 460px; padding: 48px 40px; border: 1px solid var(--border-light); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo img { height: 50px; margin-bottom: 12px; }
    .auth-logo h1 { font-size: 26px; font-weight: 800; color: var(--secondary-color); }
    .auth-logo p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--secondary-color); margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-light); border-radius: var(--radius-md); font-size: 15px; transition: var(--transition); outline: none; }
    .form-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(255,87,34,0.1); }
    .password-wrap { position: relative; }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-muted); }
    .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .remember { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); cursor: pointer; }
    .remember input { accent-color: var(--primary-color); }
    .forgot { font-size: 14px; color: var(--primary-color); text-decoration: none; font-weight: 600; }
    .submit-btn { width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: var(--radius-md); font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); position: relative; }
    .submit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .submit-btn:disabled { background: #d1d5db; cursor: not-allowed; transform: none; }
    .submit-btn.loading { color: transparent; }
    .submit-btn.loading::after { content: ''; position: absolute; width: 20px; height: 20px; top: 50%; left: 50%; margin: -10px 0 0 -10px; border: 2px solid white; border-radius: 50%; border-top-color: transparent; animation: spin 0.7s linear infinite; }
    .alert { padding: 12px 16px; border-radius: var(--radius-md); font-size: 14px; margin-bottom: 20px; display: none; border-left: 4px solid; }
    .alert.error { background: #fef2f2; color: #dc2626; border-color: #dc2626; }
    .alert.success { background: #f0fdf4; color: #16a34a; border-color: #16a34a; }
    .auth-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
    .auth-link a { color: var(--primary-color); font-weight: 700; text-decoration: none; margin-left: 4px; }
    .auth-link a:hover { text-decoration: underline; }
    .home-link { text-align: center; margin-top: 12px; }
    .home-link a { font-size: 13px; color: var(--text-muted); text-decoration: none; }
    .home-link a:hover { color: var(--primary-color); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/media/logo.png" alt="myMart">
      <h1>Welcome Back 👋</h1>
      <p>Sign in to your myMart account</p>
    </div>
    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Your password" required>
          <button type="button" class="toggle-pw" onclick="togglePw()">👁️</button>
        </div>
      </div>
      <div class="form-options">
        <label class="remember"><input type="checkbox" id="remember"> Remember me</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
    </form>
    <div class="auth-link">Don't have an account? <a href="/frontend/signup.html">Sign Up</a></div>
    <div class="home-link"><a href="/frontend/homePage.html">← Back to Home</a></div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (api.isLoggedIn()) window.location.href = '/frontend/homePage.html';
    function togglePw() { const pw = document.getElementById('password'); pw.type = pw.type === 'password' ? 'text' : 'password'; }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');
      errorAlert.style.display = 'none'; successAlert.style.display = 'none';
      btn.classList.add('loading'); btn.disabled = true;
      try {
        await api.login(email, password);
        successAlert.textContent = 'Login successful! Redirecting...';
        successAlert.style.display = 'block';
        setTimeout(() => { window.location.href = '/frontend/homePage.html'; }, 1000);
      } catch (err) {
        errorAlert.textContent = err.message || 'Invalid email or password.';
        errorAlert.style.display = 'block';
      } finally { btn.classList.remove('loading'); btn.disabled = false; }
    });
  </script>
</body>
</html>
