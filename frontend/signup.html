<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - myMart</title>
  <link rel="icon" type="image/png" href="/media/logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f3f4f6; padding: 20px; }
    .auth-card { background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); width: 100%; max-width: 480px; padding: 48px 40px; border: 1px solid var(--border-light); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo img { height: 50px; margin-bottom: 12px; }
    .auth-logo h1 { font-size: 26px; font-weight: 800; color: var(--secondary-color); }
    .auth-logo p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--secondary-color); margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border-light); border-radius: var(--radius-md); font-size: 15px; transition: var(--transition); outline: none; }
    .form-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(255,87,34,0.1); }
    .password-wrap { position: relative; }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 17px; color: var(--text-muted); }
    .strength-bar { height: 4px; border-radius: 2px; background: #e5e7eb; margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: var(--transition); width: 0; }
    .strength-text { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .terms { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
    .terms input { margin-top: 2px; accent-color: var(--primary-color); flex-shrink: 0; }
    .terms label { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .terms a { color: var(--primary-color); text-decoration: none; }
    .submit-btn { width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: var(--radius-md); font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); position: relative; }
    .submit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .submit-btn:disabled { background: #d1d5db; cursor: not-allowed; transform: none; }
    .submit-btn.loading { color: transparent; }
    .submit-btn.loading::after { content: ''; position: absolute; width: 20px; height: 20px; top: 50%; left: 50%; margin: -10px 0 0 -10px; border: 2px solid white; border-radius: 50%; border-top-color: transparent; animation: spin 0.7s linear infinite; }
    .alert { padding: 12px 16px; border-radius: var(--radius-md); font-size: 14px; margin-bottom: 20px; display: none; border-left: 4px solid; }
    .alert.error { background: #fef2f2; color: #dc2626; border-color: #dc2626; }
    .alert.success { background: #f0fdf4; color: #16a34a; border-color: #16a34a; }
    .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    .auth-link a { color: var(--primary-color); font-weight: 700; text-decoration: none; margin-left: 4px; }
    .home-link { text-align: center; margin-top: 12px; }
    .home-link a { font-size: 13px; color: var(--text-muted); text-decoration: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/media/logo.png" alt="myMart">
      <h1>Join myMart 🛍️</h1>
      <p>Create your account and start shopping</p>
    </div>
    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <form id="signupForm">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" placeholder="10-digit mobile number" maxlength="10">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Create a password" required oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="togglePw('password')">👁️</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText">Password strength</div>
      </div>
      <div class="form-group">
        <label for="confirmPw">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPw" placeholder="Confirm your password" required>
          <button type="button" class="toggle-pw" onclick="togglePw('confirmPw')">👁️</button>
        </div>
      </div>
      <div class="terms">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>
    <div class="auth-link">Already have an account? <a href="/frontend/login.html">Sign In</a></div>
    <div class="home-link"><a href="/frontend/homePage.html">← Back to Home</a></div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (api.isLoggedIn()) window.location.href = '/frontend/homePage.html';
    function togglePw(id) { const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password'; }
    function checkStrength(pw) {
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      if (score <= 2) { fill.style.width = '33%'; fill.style.background = '#ef4444'; text.textContent = 'Weak'; }
      else if (score <= 4) { fill.style.width = '66%'; fill.style.background = '#f59e0b'; text.textContent = 'Medium strength'; }
      else { fill.style.width = '100%'; fill.style.background = '#22c55e'; text.textContent = 'Strong password'; }
    }
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const btn = document.getElementById('submitBtn');
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');
      errorAlert.style.display = 'none'; successAlert.style.display = 'none';
      if (password !== confirmPw) { errorAlert.textContent = 'Passwords do not match.'; errorAlert.style.display = 'block'; return; }
      if (password.length < 8) { errorAlert.textContent = 'Password must be at least 8 characters.'; errorAlert.style.display = 'block'; return; }
      btn.classList.add('loading'); btn.disabled = true;
      try {
        await api.signup(name, email, password, mobile);
        successAlert.textContent = 'Account created! Redirecting...';
        successAlert.style.display = 'block';
        setTimeout(() => { window.location.href = '/frontend/homePage.html'; }, 1200);
      } catch (err) {
        errorAlert.textContent = err.message || 'Signup failed. Try again.';
        errorAlert.style.display = 'block';
      } finally { btn.classList.remove('loading'); btn.disabled = false; }
    });
  </script>
</body>
</html>
